<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ if not .IsHome }}{{ .Title }} — {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ .Site.Params.description }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="/" class="nav__logo">
        <span class="nav__logo-bracket">[</span>
        FGL
        <span class="nav__logo-bracket">]</span>
      </a>
      <ul class="nav__links">
        <li><a href="#projects">Projects</a></li>
        <li><a href="#stack">Stack</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  {{ block "main" . }}{{ end }}

  <!-- FOOTER -->
  <footer class="footer" id="contact">
    <div class="container">
      <div class="footer__inner reveal">
        <div class="footer__brand">
          <div class="footer__logo">{{ .Site.Title }}</div>
          <p class="footer__tagline">{{ .Site.Params.tagline }}</p>
        </div>
        <div class="footer__links">
          <a href="{{ .Site.Params.githubCollections }}" target="_blank" rel="noopener">FutureGadgetCollections ↗</a>
          <a href="{{ .Site.Params.githubPolyLabs }}" target="_blank" rel="noopener">FG-PolyLabs ↗</a>
        </div>
      </div>
      <div class="footer__bottom">
        <span>© {{ now.Year }} {{ .Site.Title }}. Built with intent.</span>
      </div>
    </div>
  </footer>

  <script src="/js/main.js"></script>
</body>
</html>
