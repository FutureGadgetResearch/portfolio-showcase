- number: "01"
  name: "TCG Collection Showcase"
  org: "FutureGadgetCollections"
  span: 3
  description: >
    Admin dashboard for managing a trading card game collection database.
    Authenticated staff perform full CRUD operations on inventory, backed by
    BigQuery with static JSON reads from GitHub/GCS for speed.
  features:
    - "Firebase Auth with email allowlist"
    - "BigQuery inventory persistence"
    - "Static JSON read / Cloud Run write separation"
  tags:
    - "Hugo"
    - "Bootstrap 5"
    - "Firebase"
    - "BigQuery"
    - "Cloud Run"
  frontend_url: "https://github.com/FutureGadgetCollections/collection-showcase-frontend"

