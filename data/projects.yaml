- number: "05"
  name: "Card Identifier"
  org: "FutureGadgetResearch"
  span: 2
  wip: true
  description: >
    Admin console for a card identification backend. Operators manage card
    records and items, with perceptual hash syncing for image deduplication.
    Reads static JSON from GitHub/GCS; writes route to a Cloud Run API.
  features:
    - "Perceptual hash sync job for card image matching"
    - "External card catalog source via params.catalog"
    - "BigQuery schema management in-repo"
  tags:
    - "Hugo"
    - "Bootstrap 5"
    - "Firebase"
    - "BigQuery"
    - "Cloud Run"
  frontend_url: "https://github.com/FutureGadgetResearch/card-identifier-admin-frontend"

